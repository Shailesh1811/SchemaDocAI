<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SchemaDocAI - PDF to JSON Converter</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            text-align: center;
        }

        .header {
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 28px;
            color: #2d3748;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .header p {
            color: #718096;
            font-size: 14px;
        }

        .upload-area {
            border: 2px dashed #cbd5e0;
            border-radius: 12px;
            padding: 40px 20px;
            margin-bottom: 30px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .upload-area:hover {
            border-color: #667eea;
            background-color: #f7fafc;
        }

        .upload-area.dragover {
            border-color: #667eea;
            background-color: #edf2f7;
            transform: scale(1.02);
        }

        .upload-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        .upload-area p {
            color: #4a5568;
            font-size: 16px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .upload-area small {
            color: #a0aec0;
            font-size: 13px;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        label {
            display: block;
            color: #2d3748;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #2d3748;
            resize: vertical;
            transition: border-color 0.3s ease;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea::placeholder {
            color: #cbd5e0;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin-top: 32px;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-reset {
            background: #f7fafc;
            color: #667eea;
            border: 1px solid #e2e8f0;
        }

        .btn-reset:hover {
            background: #edf2f7;
            border-color: #cbd5e0;
        }

        input[type="file"] {
            display: none;
        }

        .file-input-hidden {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 24px;
            }

            .upload-area {
                padding: 30px 15px;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>SchemaDocAI</h1>
                <p>Transform PDFs into structured JSON schemas</p>
            </div>

            <form id="uploadForm" action="http://localhost:3000/upload" method="POST" enctype="multipart/form-data">
                <!-- Drag and Drop Upload Area -->
                <div class="upload-area" id="dropZone">
                    <div class="upload-icon">☁️</div>
                    <p>Drag and drop your PDF here</p>
                    <small>or click to browse</small>
                    <input type="file" id="fileInput" name="pdf" accept=".pdf" required>
                </div>

                <!-- Instruction -->
                <div class="form-group">
                    <label for="instruction">Instructions</label>
                    <textarea
                        id="instruction"
                        name="instruction"
                        rows="3"
                        placeholder="Example: Extract customer name, email, and project details from this PDF"
                    ></textarea>
                </div>

                <!-- Sample JSON -->
                <div class="form-group">
                    <label for="sampleJson">Sample JSON Output</label>
                    <textarea
                        id="sampleJson"
                        name="sampleJson"
                        rows="4"
                        placeholder='Example: {&#10;"customer_name": "",&#10;"email": "",&#10;"project": ""&#10;}'
                    ></textarea>
                </div>

                <!-- Buttons -->
                <div class="button-group">
                    <button type="submit" class="btn-submit">Convert PDF</button>
                    <button type="reset" class="btn-reset">Clear</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const uploadForm = document.getElementById('uploadForm');

        // Click to upload
        dropZone.addEventListener('click', () => fileInput.click());

        // Drag and drop events
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                // Use DataTransfer to properly set files
                const dataTransfer = new DataTransfer();
                dataTransfer.items.add(files[0]);
                fileInput.files = dataTransfer.files;
            }
        });

        // File input change
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                const fileName = e.target.files[0].name;
                console.log('File selected:', fileName);
            }
        });

        // Prevent default drag behavior on the entire page
        document.addEventListener('dragover', (e) => {
            e.preventDefault();
        });

        document.addEventListener('drop', (e) => {
            e.preventDefault();
        });
    </script>
</body>

</html>
